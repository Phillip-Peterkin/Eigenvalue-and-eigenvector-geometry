data:
  root: "./data/Cogitate_IEEG_EXP1"
  subjects: ["CE103"]
  runs: ["DurR1", "DurR2", "DurR3", "DurR4", "DurR5"]

preprocessing:
  line_freq: 60.0
  high_gamma_passband: [70, 150]
  epoch_tmin: -0.5
  epoch_tmax: 2.0
  baseline: [-0.5, 0.0]

avalanche:
  threshold_sd: 3.0
  bin_width_factor: 1.0
  sensitivity:
    threshold_sd: [2.0, 2.5, 3.0, 3.5, 4.0]
    bin_width_factor: [0.5, 1.0, 2.0, 4.0]

powerlaw:
  discrete: true
  n_bootstrap: 2500
  xmin_method: "clauset"
  compare_distributions: ["exponential", "lognormal", "truncated_power_law"]

complexity:
  lzc_n_surrogates: 100
  mse_scales: [1, 20]
  mse_m: 2
  mse_r_factor: 0.15
  dfa_scales: null

statistics:
  n_perm: 5000
  alpha: 0.05
  correction: "fdr_bh"
  effect_size: "hedges_g"

decoding:
  classifier: "lda"
  cv_strategy: "leave_one_block_out"
  n_channels_list: [5, 10, 20]
  n_random: 10
  target_tau: 1.5
  n_perm_comparison: 1000

random_seed: 42

output:
  results_dir: "./results"
  save_intermediates: true
  format: "hdf5"
